name: CI

on:
  push:
    # Validate every merge landing on the integration and release branches,
    # so dev is known-good before it is promoted to main. PRs targeting any
    # branch are covered by the unfiltered pull_request trigger below.
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

# Supersede in-flight runs when a branch is force-pushed or updated; on main
# and dev every push keeps its own run so each merge gets a status.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

env:
  # Test app key (also set in phpunit.xml); lets artisan boot during install.
  APP_KEY: base64:dGVzdGluZy10ZXN0aW5nLXRlc3RpbmctdGVzdGluZy0=

jobs:
  code-quality:
    name: Lint, static analysis & audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.5"
          extensions: sockets, gd, mbstring, pdo_mysql, bcmath, intl, zip
          coverage: none

      - run: cp .env.example .env

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        # All packages (Filament included) resolve from public GitHub, so no
        # Filament licence is needed; the built-in token just lifts GitHub's
        # unauthenticated API rate limit for the download.
        run: composer install --no-interaction --prefer-dist --no-progress
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Security advisories
        run: composer audit --locked

  frontend:
    name: Frontend audit and builds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.5"
          coverage: none

      - name: Install PHP build dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --no-scripts
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Security advisories
        run: npm audit --audit-level=moderate

      - name: Build Atom theme
        run: npm run build:atom

      - name: Build Dusk theme
        run: npm run build:dusk

  tests:
    name: Pest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mariadb:
        image: mariadb:11.8.8-noble@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.5"
          extensions: sockets, gd, mbstring, pdo_mysql, bcmath, intl, zip
          coverage: none

      - run: cp .env.example .env

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        # All packages (Filament included) resolve from public GitHub, so no
        # Filament licence is needed; the built-in token just lifts GitHub's
        # unauthenticated API rate limit for the download.
        run: composer install --no-interaction --prefer-dist --no-progress
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: Run tests
        run: vendor/bin/pest
