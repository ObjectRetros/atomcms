name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Test app key (also set in phpunit.xml); lets artisan boot during install.
  APP_KEY: base64:dGVzdGluZy10ZXN0aW5nLXRlc3RpbmctdGVzdGluZy0=

jobs:
  code-quality:
    name: Lint, static analysis & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sockets, gd, mbstring, pdo_mysql, bcmath, intl, zip
          coverage: none

      - run: cp .env.example .env

      - name: Install dependencies
        # All packages (Filament included) resolve from public GitHub, so no
        # Filament licence is needed; the built-in token just lifts GitHub's
        # unauthenticated API rate limit for the download.
        run: composer install --no-interaction --prefer-dist --no-progress
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Security advisories
        run: composer audit --locked

  tests:
    name: Pest
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: password
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sockets, gd, mbstring, pdo_mysql, bcmath, intl, zip
          coverage: none

      - run: cp .env.example .env

      - name: Install dependencies
        # All packages (Filament included) resolve from public GitHub, so no
        # Filament licence is needed; the built-in token just lifts GitHub's
        # unauthenticated API rate limit for the download.
        run: composer install --no-interaction --prefer-dist --no-progress
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'

      - name: Run tests
        run: vendor/bin/pest
