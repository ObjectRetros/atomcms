version: 2

updates:
  - package-ecosystem: composer
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    groups:
      composer-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker-compose
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
